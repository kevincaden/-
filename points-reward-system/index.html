<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>积分兑换系统 v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .admin-only { display: none; } /* 默认隐藏管理员功能 */
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-blue-600 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">积分兑换商城</h1>
            <div id="auth-section">
                <span id="user-display" class="mr-4"></span>
                <button id="logout-btn" class="bg-red-500 px-3 py-1 rounded hidden">退出</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-6">
        <div id="login-container" class="max-w-md mx-auto bg-white p-8 rounded shadow-lg">
            <h2 class="text-2xl mb-6 text-center font-semibold">用户登录</h2>
            <input type="text" id="login-username" placeholder="用户名" class="w-full p-2 mb-4 border rounded">
            <input type="password" id="login-password" placeholder="密码" class="w-full p-2 mb-6 border rounded">
            <button id="login-btn" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">登录</button>
        </div>

        <div id="main-content" class="hidden">
            <div class="admin-only mb-8 p-4 bg-yellow-100 border-l-4 border-yellow-500 rounded">
                <h3 class="font-bold mb-2">管理员面板</h3>
                <button onclick="showAddGiftModal()" class="bg-green-600 text-white px-4 py-2 rounded">添加新礼品</button>
            </div>

            <h2 class="text-2xl font-bold mb-6">礼品列表</h2>
            <div id="gift-list" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
                </div>
        </div>

        <div id="loading-spinner" class="hidden text-center mt-10 text-gray-500">
            数据加载中，请稍候...
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
